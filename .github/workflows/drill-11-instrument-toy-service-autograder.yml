name: drill-11-instrument-toy-service-autograder

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  autograder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run autograder
        run: |
          pytest tests/ -v
